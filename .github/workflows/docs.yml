name: Docs

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: "1.26"

permissions:
  contents: write

jobs:
  generate-docs:
    name: Generate Docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the PR head branch (not the merge ref) so generated-doc
          # changes can be committed straight back onto it.
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Update generated docs
        run: ./generate-docs.sh
      - name: Commit changes
        # Only commits & pushes when generate-docs.sh produced a diff.
        uses: EndBug/add-and-commit@v9
        with:
          author_name: update generated docs action
          author_email: mail@example.com
          message: "Update docs"
          add: "docs/*"
