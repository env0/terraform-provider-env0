name: 'Auto Assign PR to author'
on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-assignee:
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - uses: kentaro-m/auto-assign-action@v1.2.4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
